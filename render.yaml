# Render Blueprint: Background Worker for Telegram long-polling.
# Deploy: Dashboard → New → Blueprint → connect this repo.
#
# Background workers do NOT support Render's "Free" instance type — use Starter or higher.
# https://render.com/docs/yaml-spec

services:
  - type: worker
    name: vvc-telebot
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: BOT_PASSCODE
        sync: false
      - key: ADMIN_TELEGRAM_IDS
        sync: false
      - key: GOOGLE_SHEET_ID
        sync: false
      # Paste the full JSON from Google (multiline secret in Render dashboard).
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: CCA_OPTIONS
        sync: false
